# The main pipeline for nativo_migration

resources:
  pipelines:
    nativo_migration_etl:
      name: nativo_migration_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/nativo_migration_etl"

      libraries:
        - glob:
            include: ../src/nativo_migration_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
