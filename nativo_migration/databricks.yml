# This is a Databricks asset bundle definition for nativo_migration.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
# terraform:
#     exec_path: terraform
bundle:
  name: nativo_migration
  
  uuid: 9065e3b1-e23c-4dfb-a778-d0d875ea0596

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://8259550887524799.9.gcp.databricks.com
    variables:
      catalog: nativo_prod
      schema: raw_test
      clusters:
      - name: nativo_dev_cluster
        spark_version: "15.4.x-scala2.12"
        node_type_id: "n2-highmem-4"
        num_workers: 1
        gcp_attributes:
          availability: PREEMPTIBLE_GCP
          preemptible_percentage: 100
        disk_spec:
          disk_type:
            gcp_disk_type: BALANCED_SSD
          disk_size: 50
          disk_count: 1
  prod:
    mode: production
    workspace:
      host: https://8259550887524799.9.gcp.databricks.com
      # We explicitly deploy to /Workspace/Users/bibhuanmitaca@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/bibhuanmitaca@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: nativo_prod
      schema: raw
    permissions:
      - user_name: bibhuanmitaca@gmail.com
        level: CAN_MANAGE
