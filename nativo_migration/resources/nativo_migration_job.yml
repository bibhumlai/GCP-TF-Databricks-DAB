resources:
  jobs:
    nativo_medallion_pipeline:
      name: "[${bundle.target}] Nativo Medallion ETL"
      
      job_clusters:
        - job_cluster_key: migration_cluster
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "n1-standard-4"
            num_workers: 1
            # Explicitly ensure no policy is overriding the Job lifecycle
            # policy_id: null 

      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: migration_cluster
          spark_python_task: # Corrected from python_task
            python_file: "../src/nativo_migration/generator.py"
            parameters: # Note: 'base_parameters' is usually just 'parameters' in spark_python_task
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}

        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          job_cluster_key: migration_cluster
          spark_python_task: # Corrected from python_task
            python_file: "../src/nativo_migration/notebook.py"

        - task_key: test_transformation
          depends_on:
            - task_key: silver_transformation
          job_cluster_key: migration_cluster
          spark_python_task: # Corrected from python_task
            python_file: "../src/nativo_migration/test_migration.py"